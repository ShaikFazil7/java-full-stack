<!DOCTYPE html>
<html lang="en">
<head>
    <script src="form.js"></script>
</head>
<body>
    <h1>Driving License</h1>
    <form id="details">
<label>Name:</label>
<input type="text" id="name" required>
<br><br>
<label>Email:</label>
<input type="email" id="mail" required>
<br><br>
<label>Phone No:</label>
<input type="number" id="phone" required>
<br><br>
<label>DOB:</label>
<input type="date" id="dob">
<br><br>
<label>Color:</label>
<input type="color">
<br><br>
<label>Age:</label>
<input type="number" id="age" required>
<br><br>
<label>Gender:</label>
<input type="radio" name="gender" id="male" value="male" required>Male
<input type="radio" name="gender" id="female" value="female" required>FeMale
<input type="radio" name="gender" id="not to mention" value="not to mention" required>not to mention
<br><br>
<label>Verified</label>
<input type="checkbox" name="document" value="Rc Book">RC
<input type="checkbox" name="document" value="Insurance">Insurance
<input type="checkbox" name="document" value="Pollution Control">Pollution Control
<br><br>
<label>Address:</label>
<input type="text" id="address" required>
<br><br>
<label>Photo:</label>
<input type="file" id="image" accept="image/*" required>
<br><br>
 <button type="submit"> Submit</button>
    </form>
    <hr>
    <h2> License Details</h2>
    <p id="p1"></p>
    <p id="p2"></p>
    <p id="p3"></p>
    <p id="p4"></p>
    <p id="p5"></p>
    <p id="p6"></p>
    <img id="dp" width="200px">
</body>
</html>
